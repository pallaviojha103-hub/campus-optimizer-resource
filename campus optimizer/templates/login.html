<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartCampus</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
        }
        .auth-form {
            max-width: 400px;
            width: 100%;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo-icon">🏫</div>
            <div>
                <h1>SmartCampus</h1>
                <span>Resource Optimizer</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-form">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for message in messages %}
                            <p>{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}
            <form method="POST">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <button type="submit">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px;">
                Don't have an account? <a href="/register" style="color: var(--accent-primary); text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
